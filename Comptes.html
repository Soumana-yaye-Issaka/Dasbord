            <div class="mt-5 text-white d-flex flex-column gap-3">

                <article class="d-flex gap-2 fs-5 p-2 rounded navigation">

                </article>
                <article class="d-flex gap-2 fs-5 p-2 rounded navigation">

                    <i class="bi bi-chevron-right"></i>
                </article>
                <article class="d-flex gap-2 fs-5 p-2 rounded navigation">
                    <a href="Taches.html" class="card-link nav-link">Taches</a>
                    <i class="bi bi-chevron-right"></i>
                </article>
                <article class="d-flex gap-2 fs-5 p-2 rounded navigation">
                    <a href="#" class="card-link nav-link">Calendrier</a>

                <article class="d-flex gap-2 fs-5 p-2 rounded navigation navigation_active">

    <nav class="card p-2 d-flex flex-row justify-content-between align-items-center text-white sticky-top compte_navig">

        <div class="">
            <h3 class="m-0">Comptes </h3>
            <p><i class="bi bi-house-fill"></i> <i class="bi bi-chevron-right"></i>Paramétre du compte</p>

            <button class="border-0 text-white fs-4" style="background-color: transparent;">
                <a class="nav-link" href="#"><i class="bi bi-bell"></i></a>
                <article class="Message"></article>
            </button>
            <button class="border-0 text-white fs-4" style="background-color: transparent;">
                <a class="nav-link" href="index.html"><i class="bi bi-person-lock"></i></a>
            </button>
        </div>

    </nav>




    <main class="mt-4 p-3 rounded border compte_navig card_scrolling sticky-top">


        <div class="card border-0 bg-transparent d-flex flex-row gap-2 p-2 mb-5 carte_Niger  compte_navig">
            <button class="btn d-flex align-items-center justify-content-center text-white w-100 btn_Messagenav">
                <a class="nav-link d-flex align-items-center gap-1" href="#"> <i class="bi bi-person fs-5"></i>
                    <p class="m-0 fs-5">Compte</p>
                </a>
            </button>
            <button class="btn d-flex align-items-center justify-content-center text-white w-100 btn_Messagenav1">
                <a class="nav-link d-flex align-items-center gap-1" href="#"> <i class="bi bi-lock fs-5"></i>
                    <p class="m-0 fs-5">Sécururité</p>
                </a>
            </button>
            <button class="btn d-flex align-items-center justify-content-center text-white w-100 btn_Messagenav1">
                <a class="nav-link d-flex align-items-center gap-1" href="#"> <i class="bi bi-files fs-5"></i>
                    <p class="m-0 fs-5">Documents</p>
                </a>
            </button>
            <button class="btn d-flex align-items-center justify-content-center text-white w-100 btn_Messagenav1">
                <a class="nav-link d-flex align-items-center gap-1" href="#"> <i class="bi bi-receipt-cutoff fs-5"></i>
                    <p class="m-0 fs-5">Historique</p>
                </a>
            </button>
            <button class="btn d-flex align-items-center justify-content-center text-white w-100 btn_Messagenav1">
                <a class="nav-link d-flex align-items-center gap-1" href="#"> <i class="bi bi-link-45deg fs-5"></i>
                    <p class="m-0 fs-5">Connexion</p>
                </a>
            </button>
        </div>


        <div>

            <section class="d-flex gap-3">
                <input class="border-0 rounded carte_Niger" type="image" src="" alt="" style="height: 200px; width: 150px;">
                <div class="text-white">
                    <article class="d-flex gap-3 mb-3">
                        <button class="btn text-white btn-Utilisateur "><i class="bi bi-file-image"></i> Changer la
                            photo de
                            profil</button>
                        <button class="btn text-white Table_Ranger">Réinitialiser</button>
                    </article>
                    <p>Format prise en charge: JPG, GIF, ou PNG. <br> Taille maximale 800K </p>
                </div>
            </section>


            <form class="text-white mt-5" action="">
                <div class="d-flex flex-row gap-3 mb-3">
                    <div class="w-100">
                        <label for="validationDefault01" class="form-label">Nom</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault01" value=""
                            required placeholder="Nom actuel">
                    </div>
                    <div class="w-100">
                        <label for="validationDefault02" class="form-label">Prénom</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault02" value=""
                            required placeholder="Prénom actuel">
                    </div>
                </div>
                <div class="d-flex flex-row gap-3 mb-3">
                    <div class="w-100">
                        <label for="validationDefault01" class="form-label">Email</label>
                        <input type="email" class="form-control bg-transparent boder" id="validationDefault01" value=""
                            required placeholder="Email actuel">
                    </div>
                    <div class="w-100">
                        <label for="validationDefault02" class="form-label">Status</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault02" value=""
                            required placeholder="Status actuel">
                    </div>
                </div>
                <div class="d-flex flex-row gap-3 mb-3">
                    <div class="w-100">
                        <label for="validationDefault01" class="form-label">Role</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault01" value=""
                            required placeholder="Role actuel">
                    </div>
                    <div class="w-100">
                        <label for="validationDefault02" class="form-label">Tache</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault02" value=""
                            required placeholder="Tache actuelle">
                    </div>
                </div>
                <div class="d-flex flex-row gap-3 mb-3">
                    <div class="w-100">
                        <label for="validationDefault01" class="form-label">N° de telephone</label>
                        <input type="tel" class="form-control bg-transparent boder" id="validationDefault01" value=""
                            required placeholder="N° actuel">
                    </div>
                    <div class="w-100">
                        <label for="validationDefault02" class="form-label">Adesse</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault02" value=""
                            required placeholder="Adresse actuel">
                    </div>
                </div>
                <div class="d-flex flex-row gap-3 mb-3">
                    <div class="w-100">
                        <label for="validationDefault01" class="form-label">Pays</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault01" value=""
                            required placeholder="Pays actuel">
                    </div>
                    <div class="w-100">
                        <label for="validationDefault02" class="form-label">Ville</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault02" value=""
                            required placeholder="Ville actuelle">
                    </div>
                </div>
                <div class="d-flex flex-row gap-3 mb-3">
                    <div class="w-100">
                        <label for="validationDefault01" class="form-label">Boite postal</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault01" value=""
                            required placeholder="Boite postal actuelle">
                    </div>
                    <div class="w-100">
                        <label for="validationDefault02" class="form-label">Langue</label>
                        <input type="text" class="form-control bg-transparent boder" id="validationDefault02" value=""
                            required placeholder="Langue actuelle">
                    </div>
                </div>

                <button class="btn text-white btn-Utilisateur">Sauvegarder les changement</button>
                <button class="btn text-white Table_Ranger">Annuler</button>
            </form>

        </div>


        <div class="text-white border-1 rounded p-3 mt-3 carte_Niger compte_navig">
            <p>Supprimez le compte</p>
            <div class="card bg-transparent p-2 px-5 Prevention">
                <h5>Etes vous sur de vouloir supprimer ce compte ?</h5>
                <p>Une fois que vous aurez supprimer ce compte vous ne pourrez plus le récupérer</p>
            </div>
            <div class="mt-2">
                <input type="checkbox" name="" id="flexCheckDefault">
                <label for="flexCheckDefault">Je confirme la suppression du compte</label>
            </div>
        </div>
